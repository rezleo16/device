<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying...</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--tg-theme-button-color, #3390ec);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Preparing Verification...</h2>
    <p>You will be securely redirected to your native browser.</p>

    <script>
        // Tell Telegram the Web App is ready
        window.Telegram.WebApp.ready();

        // Expand the web app to full height
        window.Telegram.WebApp.expand();

        setTimeout(() => {
            // Get the session token from the startapp parameter
            // The bot URL should be t.me/YourBot/App?startapp=TOKEN_ABC123
            const token = window.Telegram.WebApp.initDataUnsafe.start_param;

            if (!token) {
                document.body.innerHTML = '<h2>Error</h2><p>No verification token found. Please use the button provided by the bot.</p>';
                return;
            }

            // IMPORTANT: Replace this with the URL where your external browser.html is hosted!
            const EXTERNAL_HOST = 'https://your-external-site.com';
            const externalUrl = `${EXTERNAL_HOST}/browser.html?token=${token}`;

            // Force open the link in the external, native browser (Safari/Chrome)
            window.Telegram.WebApp.openLink(externalUrl);
            
            // Optionally close the Mini App right after
            setTimeout(() => {
                window.Telegram.WebApp.close();
            }, 1500);

        }, 1000); // 1-second delay just to show the UI smoothly
    </script>
</body>
</html>
