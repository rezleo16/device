<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying...</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--tg-theme-button-color, #3390ec);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="spinner"></div>
    <h2>Preparing Verification...</h2>
    <p>You will be securely redirected to your native browser.</p>

    <script>
        // Tell Telegram the Web App is ready
        window.Telegram.WebApp.ready();

        // Expand the web app to full height
        window.Telegram.WebApp.expand();

        // In a real production app, the backend should cryptographically validate Telegram.WebApp.initData 
        // to prevent spoofing. For this architecture, we will extract the ID and call the API.
        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        
        // Wait briefly for UI to render
        setTimeout(async () => {
            if (!initDataUnsafe || !initDataUnsafe.user) {
                document.body.innerHTML = '<h2>Error</h2><p>Please open this inside Telegram.</p>';
                return;
            }

            const userId = initDataUnsafe.user.id;
            
            // To make this a true SaaS, other developers will set their BotFather WebApp URL to:
            // https://device-sooty.vercel.app/index.html?bot_id=THEIR_BOT_ID
            const urlParams = new URLSearchParams(window.location.search);
            const botId = urlParams.get('bot_id') || '8617089736'; // Fallback to your test bot ID
            
            try {
                // Call our own backend API to generate a secure session
                const response = await fetch('/api/session/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, bot_id: botId })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Redirect to the external Fingerprinting site with the secure token
                    const EXTERNAL_HOST = 'https://rezleo16.github.io/browser';
                    const externalUrl = `${EXTERNAL_HOST}/index.html?token=${data.session_token}`;
                    
                    // Open the link in the external browser
                    window.Telegram.WebApp.openLink(externalUrl, { try_instant_view: false });
                    
                    // Provide a fallback button in case the OS/Telegram blocks the automatic redirect
                    document.body.innerHTML = `
                        <div style="margin-top: 20px;">
                            <h2>Verification Ready</h2>
                            <p>If your browser didn't open automatically, click below:</p>
                            <button onclick="window.Telegram.WebApp.openLink('${externalUrl}')" 
                                    style="padding: 12px 24px; background: #3390ec; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;">
                                Open Browser
                            </button>
                        </div>
                    `;
                    
                    // We REMOVED the setTimeout auto-close because on Android/iOS, closing 
                    // the Mini App too fast can kill the system intent to open the browser!
                } else {
                    document.body.innerHTML = '<h2>Error</h2><p>Could not initialize session.</p>';
                }
            } catch (err) {
                document.body.innerHTML = '<h2>Network Error</h2><p>Backend unreachable.</p>';
            }
        }, 1000);
    </script>
</body>

</html>
