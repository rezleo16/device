<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Verification</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0d0e15;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        /* Background Glows */
        .glow-1 { position: absolute; width: 300px; height: 300px; background: rgba(99, 102, 241, 0.25); filter: blur(100px); border-radius: 50%; top: -100px; left: -100px; z-index: -1; }
        .glow-2 { position: absolute; width: 300px; height: 300px; background: rgba(168, 85, 247, 0.2); filter: blur(100px); border-radius: 50%; bottom: -100px; right: -100px; z-index: -1; }
        
        .shield-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
        }
        .shield {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #6366f1;
            border-bottom-color: #a855f7;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        .shield-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
        }
        h2 { font-weight: 600; font-size: 1.6rem; margin-bottom: 10px; letter-spacing: 0.5px; }
        p { color: #94a3b8; font-size: 1rem; line-height: 1.5; max-width: 300px; margin: 0 auto; }
        
        .fallback-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .fallback-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; } }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div id="ui-container">
        <div class="shield-container">
            <div class="shield"></div>
            <div class="shield-inner"></div>
        </div>
        <h2>Secure Gateway</h2>
        <p>Establishing an encrypted session. You will be securely redirected shortly.</p>
        <div id="debug-info" style="margin-top: 20px; font-size: 0.85rem; color: #64748b; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 6px; display: inline-block;">
            Detecting Bot Info...
        </div>
    </div>

    <script>
        // Tell Telegram the Web App is ready
        window.Telegram.WebApp.ready();

        // Expand the web app to full height
        window.Telegram.WebApp.expand();

        // In a real production app, the backend should cryptographically validate Telegram.WebApp.initData 
        // to prevent spoofing. For this architecture, we will extract the ID and call the API.
        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        
        // Wait briefly for UI to render
        setTimeout(async () => {
            if (!initDataUnsafe || !initDataUnsafe.user) {
                document.getElementById('ui-container').innerHTML = `
                    <h2 style="color: #f87171;">Access Denied</h2>
                    <p>Please open this verification gateway inside the Telegram App.</p>
                `;
                return;
            }

            const userId = initDataUnsafe.user.id;
            
            // To make this a true SaaS, developers will set their Inline Button URL to:
            // url="https://t.me/TheirBot/app?startapp=THEIR_BOT_ID"
            
            // Extract the botId from Telegram's start_param payload
            let botId = initDataUnsafe.start_param;

            // Fallback for standard URL params if someone opens it via direct HTTPS link
            const urlParams = new URLSearchParams(window.location.search);
            if (!botId) botId = urlParams.get('bot_id');

            botId = botId || '8617089736'; // Final fallback to your test bot ID

            // Show Debug Info
            document.getElementById('debug-info').innerHTML = `Detected Bot ID: ${botId}`;
            
            try {
                // Call our own backend API to generate a secure session
                const response = await fetch('/api/session/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, bot_id: botId })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Redirect to the external Fingerprinting site with the secure token
                    const EXTERNAL_HOST = 'https://rezleo16.github.io/browser';
                    const externalUrl = `${EXTERNAL_HOST}/index.html?token=${data.session_token}&bot_id=${botId}`;
                    
                    // Open the link in the external browser
                    window.Telegram.WebApp.openLink(externalUrl, { try_instant_view: false });
                    
                    // Provide a fallback button in case the OS/Telegram blocks the automatic redirect
                    document.getElementById('ui-container').innerHTML = `
                        <div style="margin-top: 10px;">
                            <h2>Verification Ready</h2>
                            <p>If your browser didn't open automatically, click the button below:</p>
                            <button class="fallback-btn" onclick="window.Telegram.WebApp.openLink('${externalUrl}', { try_instant_view: false })">
                                Open Secure Browser
                            </button>
                        </div>
                    `;
                } else {
                    document.getElementById('ui-container').innerHTML = `
                        <h2 style="color: #f87171;">Session Error</h2>
                        <p>Could not initialize secure session. Please try again.</p>
                    `;
                }
            } catch (err) {
                document.getElementById('ui-container').innerHTML = `
                    <h2 style="color: #f87171;">Network Error</h2>
                    <p>Backend is unreachable. Please check your connection.</p>
                `;
            }
        }, 1500); // 1.5s delay to let the user see the beautiful animation
    </script>
</body>
</html>
